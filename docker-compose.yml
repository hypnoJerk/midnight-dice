version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: midnight_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-midnight_db}
    ports:
      - "127.0.0.1:${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d midnight_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: midnight_server
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-midnight_db}
      PORT: 3001
      PURGE_DB: ${PURGE_DB:-false}
      RESET_DB: ${RESET_DB:-false}
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./shared:/shared
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: midnight_client
    restart: always
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS:-localhost,127.0.0.1}
    volumes:
      - ./client:/app
      - /app/node_modules
      - ./shared:/shared
    depends_on:
      - server

  nginx:
    image: nginx:alpine
    container_name: midnight_nginx
    restart: always
    ports:
      - "127.0.0.1:${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server

volumes:
  pgdata:
